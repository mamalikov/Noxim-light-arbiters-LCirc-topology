# Default config for LCirculant topology with Simple greedy routing algorithm
# Each parameter is overwritten when corresponding command line value is set
#
# NOC & WIRED CONFIGURATION
#
# Topologies:
#   MESH
#   LCIRCULANT
#   BUTTERFLY
#   BASELINE
#   OMEGA
#
# LCirculant parameters:
#   lcirc_S in {1..6}
#   lcirc_d, lcirc_k are integers
#   From these, N, s1, s2, a, b are computed internally.
#
topology: LCIRCULANT

# LCirculant family and parameters
lcirc_S: 5
lcirc_d: 6
lcirc_k: 3

# Buffer size per router input (flits)
buffer_depth: 4

# Flit size in bits
flit_size: 32

# Length in mm of router to hub connection
r2h_link_length: 2.0
# Length in mm of router to router connection
r2r_link_length: 1.0

n_virtual_channels: 4

# Routing algorithms:
#   XY
#   WEST_FIRST
#   DELTA
#   NORTH_LAST
#   NEGATIVE_FIRST
#   ODD_EVEN
#   DYAD
#   TABLE_BASED
#   LCIRC        # специализированный алгоритм для LCirculant (Algorithm 1)
#   LCIRC_DIJKSTRA  # алгоритм Дейкстры для LCirculant
#   LCIRC_SIMPLE    # простой жадный алгоритм для LCirculant
# Для LCirculant в данном конфиге используем LCIRC_SIMPLE
routing_algorithm: LCIRC_SIMPLE
routing_table_filename: ""

# Routing specific parameters
#   dyad_threshold: double
dyad_threshold: 0.6

# Selection Strategies:
#   RANDOM
#   BUFFER_LEVEL
#   NOP
selection_strategy: RANDOM

#
# WIRELESS CONFIGURATION
#
Hubs:
    defaults:
        # channels from which Hub can receive/transmit
        rx_radio_channels: [0]
        tx_radio_channels: [0]
        # list of node tiles attached to the hub
        attached_nodes: []
        # size of buffers connecting the hub to tiles
        to_tile_buffer_size: 4
        from_tile_buffer_size: 4
        # size of antenna tx/rx
        rx_buffer_size: 4
        tx_buffer_size: 4

RadioChannels:
    defaults:
        # data rate in Gb/s affects the number of cycles required
        # for a flit transmission
        data_rate: 16
        # bit error rate (currently unsupported)
        ber: [0, 0]
        # MAC policy
        mac_policy: [TOKEN_PACKET]

#
# SIMULATION PARAMETERS
#
clock_period_ps: 1000
# duration of reset signal assertion, expressed in cycles
reset_time: 1000
# overal simulation lenght, expressed in cycles
simulation_time: 10000
# collect stats after a given number of cycles
stats_warm_up_time: 1000
# power breakdown, nodes communication details
detailed: false
# stop after a given amount of load has been processed
max_volume_to_be_drained: 0
show_buffer_stats: false

# Winoc
use_winoc: false
use_wirxsleep: false

# Verbosity level:
#   VERBOSE_OFF
#   VERBOSE_LOW
#   VERBOSE_MEDIUM
#   VERBOSE_HIGH
verbose_mode: VERBOSE_OFF

# Trace
trace_mode: false
trace_filename: "trace.txt"

min_packet_size: 8
max_packet_size: 8
packet_injection_rate: 0.01
probability_of_retransmission: 0.01

# Traffic distribution:
#   TRAFFIC_RANDOM
#   TRAFFIC_TRANSPOSE1
#   TRAFFIC_TRANSPOSE2
#   TRAFFIC_HOTSPOT
#   TRAFFIC_TABLE_BASED
#   TRAFFIC_BIT_REVERSAL
#   TRAFFIC_SHUFFLE
#   TRAFFIC_BUTTERFLY
#   TRAFFIC_HARDCODED
traffic_distribution: TRAFFIC_RANDOM
traffic_table_filename: "t.txt"
traffic_hardcoded_filename: "t.txt"
